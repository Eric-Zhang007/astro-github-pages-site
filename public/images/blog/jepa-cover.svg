    <circle cx="540" cy="264" r="10"/>
    <circle cx="540" cy="316" r="10"/>
    <circle cx="806" cy="282" r="13"/>
    <circle cx="806" cy="338" r="13"/>
    <circle cx="982" cy="292" r="10"/>
    <circle cx="1012" cy="346" r="10"/>
  </g>
  <text x="112" y="548" fill="#ffffff" font-size="74" font-family="Inter,Arial,sans-serif" font-weight="800" letter-spacing="-3">JEPA</text>
  <text x="112" y="604" fill="#d8fbff" font-size="28" font-family="Inter,Arial,sans-serif">Predicting abstract representations, not pixels.</text>
</svg>
